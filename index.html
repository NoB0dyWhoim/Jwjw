<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Camera to Telegram</title>
</head>
<body>

<h2>Ambil Foto dan Kirim ke Telegram</h2>

<video id="video" width="300" autoplay></video>
<br><br>

<button id="capture">Ambil Foto</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const botToken = "8614744009:AAEu0vGF14i_rVeZL6Q6ean-Vq_VC0xrdwc";
const chatId = "7856697051";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const button = document.getElementById("capture");

// akses kamera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Kamera tidak bisa diakses");
});

// tombol ambil foto
button.onclick = async () => {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video,0,0);

    const blob = await new Promise(resolve =>
        canvas.toBlob(resolve,"image/jpeg")
    );

    const formData = new FormData();
    formData.append("chat_id",chatId);
    formData.append("photo",blob,"photo.jpg");

    fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`,{
        method:"POST",
        body:formData
    })
    .then(res => res.json())
    .then(data => {
        alert("Foto terkirim ke Telegram!");
        console.log(data);
    })
    .catch(err => {
        console.log(err);
        alert("Gagal kirim foto");
    });

};

</script>

</body>
</html>
